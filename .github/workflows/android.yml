name: Build Android APK (Capacitor Safe)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (safe mode)
        run: |
          if [ -f package.json ]; then npm install || true; fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor CLI
        run: npm install @capacitor/core @capacitor/cli @capacitor/android || true

      - name: Sync Capacitor
        run: npx cap sync android || true

      - name: Setup Android SDK (cloud)
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: novacore-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
